<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全新版段考時程表Pro - 最新公告</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFB347;
            --secondary: #70D6FF;
            --accent: #FF70A6;
            --bg-color: #F8F9FA;
            --text-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 漂浮的背景元素 */
        .bg-img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.15;
            z-index: -1;
            filter: blur(5px);
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
            border: 8px solid white;
            text-align: center;
            position: relative;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            z-index: 10;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .icon-container {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 35px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(5deg); }
            50% { transform: translateY(-15px) rotate(-5deg); }
        }

        .icon-container img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        h1 {
            color: var(--text-color);
            font-size: 32px;
            margin-bottom: 20px;
            line-height: 1.4;
            font-weight: 700;
        }

        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 10px 25px rgba(255, 112, 166, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 112, 166, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 14px;
            color: #999;
        }

        /* 小裝飾 */
        .blob {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            bottom: -100px;
            right: -100px;
            opacity: 0.5;
            animation: pulse 8s infinite;
        }

        .blob-2 {
            top: -100px;
            left: -100px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.2; }
        }

    </style>
</head>
<body>

    <img src="bg.png" class="bg-img" alt="Cute Background">

    <div class="blob"></div>
    <div class="blob-2" class="blob"></div>

    <div class="container">
        <div class="icon-container">
            <img src="bg.png" alt="Icon">
        </div>
        <h1>✨ 全新改版 ✨<br>段考時程表 Pro</h1>
        <p>
            親愛的老師您好：<br>
            全新版的段考時程表已經正式上線囉！<br>
            功能更強大、操作更流暢。<br>
            請各位老師到「第一站」連結使用。
        </p>
        <a href="https://littleyi22.github.io/classroom-screen/" class="btn">🚀 立即前往第一站</a>
        
        <div class="footer-note">
            網址：https://littleyi22.github.io/classroom-screen/
        </div>
    </div>

    <script>
        // 加入一些微互動
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.container');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
</body>
</html>
